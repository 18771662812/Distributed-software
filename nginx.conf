user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ============ 轮询负载均衡配置 ============
    upstream backend_round_robin {
        # 轮询：依次分配请求到各个后端实例
        server backend1:8080;
        server backend2:8080;
    }

    # ============ 权重负载均衡配置 ============
    upstream backend_weighted {
        # 权重：backend1 处理 70% 的请求，backend2 处理 30% 的请求
        server backend1:8080 weight=7;
        server backend2:8080 weight=3;
    }

    # ============ 最少连接负载均衡配置 ============
    upstream backend_least_conn {
        # 最少连接：优先分配给连接数最少的后端实例
        least_conn;
        server backend1:8080;
        server backend2:8080;
    }

    # ============ IP Hash 负载均衡配置 ============
    upstream backend_ip_hash {
        # IP Hash：同一客户端 IP 的请求总是分配到同一后端实例
        ip_hash;
        server backend1:8080;
        server backend2:8080;
    }

    # 轮询模式服务器
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://backend_round_robin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 权重模式服务器（监听 8001 端口）
    server {
        listen 8001;
        server_name _;

        location / {
            proxy_pass http://backend_weighted;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 最少连接模式服务器（监听 8002 端口）
    server {
        listen 8002;
        server_name _;

        location / {
            proxy_pass http://backend_least_conn;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # IP Hash 模式服务器（监听 8003 端口）
    server {
        listen 8003;
        server_name _;

        location / {
            proxy_pass http://backend_ip_hash;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
